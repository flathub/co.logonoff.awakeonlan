id: co.logonoff.awakeonlan
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: awakeonlan
finish-args:
- --share=network
- --share=ipc
- --socket=fallback-x11
- --device=dri
- --socket=wayland
cleanup-commands:
  - python3 -m compileall --invalidation-mode=unchecked-hash /app
modules:
- name: awake-on-lan
  buildsystem: meson
  sources:
  - type: git
    url: https://github.com/logonoff/awake-on-lan.git
    commit: 85fb19954bd6ada49032fb3059531a29ab89cf26
