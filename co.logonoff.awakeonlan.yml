id: co.logonoff.awakeonlan
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: awakeonlan
finish-args:
- --share=network
- --share=ipc
- --socket=fallback-x11
- --device=dri
- --socket=wayland
cleanup-commands:
  - python3 -m compileall --invalidation-mode=unchecked-hash /app
modules:
- name: awake-on-lan
  buildsystem: meson
  sources:
  - type: git
    url: https://github.com/logonoff/awake-on-lan.git
    commit: a1cec8b3418664d2d5eccbd5d6a8d41521bd9fa7
